apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-serve
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: docling-serve
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docling-serve
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: docling
          image: quay.io/docling-project/docling-serve:latest
          ports:
            - name: http
              containerPort: 5001
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
