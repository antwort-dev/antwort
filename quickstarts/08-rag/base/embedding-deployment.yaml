apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: embedding-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: embedding-service
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vllm
          image: docker.io/vllm/vllm-openai:latest
          args:
            - --model=sentence-transformers/all-MiniLM-L6-v2
            - --task=embed
            - --dtype=float16
            - --max-model-len=512
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
