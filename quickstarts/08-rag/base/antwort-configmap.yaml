apiVersion: v1
kind: ConfigMap
metadata:
  name: antwort-config
data:
  config.yaml: |
    server:
      port: 8080

    engine:
      provider: vllm
      backend_url: http://llm-predictor.llm-serving.svc.cluster.local:8080
      default_model: /mnt/models
      max_turns: 10

    storage:
      type: memory
      max_size: 10000

    auth:
      type: none

    observability:
      metrics:
        enabled: true
        path: /metrics

    providers:
      file_search:
        enabled: true
        settings:
          backend: qdrant
          backend_url: http://qdrant:6333
          embedding_url: http://embedding-service:8000/v1/embeddings
          embedding_model: sentence-transformers/all-MiniLM-L6-v2
          max_results: 10

      files:
        enabled: true
        settings:
          store_type: filesystem
          store_path: /data/files
          max_upload_size: 52428800
          docling_url: http://docling-serve:5001
          docling_ocr: true
          docling_timeout: 300s
          chunk_size: 800
          chunk_overlap: 200
          pipeline_workers: 4
