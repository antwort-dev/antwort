apiVersion: v1
kind: ConfigMap
metadata:
  name: antwort-config
data:
  config.yaml: |
    server:
      port: 8080

    engine:
      provider: vllm
      backend_url: http://qwen-7b-predictor.llama-serving.svc.cluster.local:8080
      default_model: /mnt/models
      max_turns: 10

    storage:
      type: memory
      max_size: 10000

    auth:
      type: none

    observability:
      metrics:
        enabled: true
        path: /metrics

    providers:
      file_search:
        enabled: true
        settings:
          backend: memory
          embedding_url: http://embedding-service:8000/v1/embeddings
          embedding_model: sentence-transformers/all-MiniLM-L6-v2
          max_results: 10

      files:
        enabled: true
        settings:
          store_type: memory
          max_upload_size: 52428800
          chunk_size: 800
          chunk_overlap: 200
          pipeline_workers: 4
